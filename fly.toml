# Fly.io config — scale-to-zero: the machine stops when nobody is connected
# and boots automatically (~1-3 s) when the host or a client connects.
#
# First deploy:
#   fly launch --no-deploy          # creates the app; accepts this config
#   fly secrets set GEMINI_API_KEY=... DEEPGRAM_API_KEY=... GOOGLE_CLOUD_TTS_KEY=...
#   fly deploy

app = "translator-pipeline"
# Pick the region closest to the church (fly platform regions lists them).
primary_region = "nrt"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
