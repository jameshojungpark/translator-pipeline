<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Sermon Translation</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #111; color: #eee;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; background: #1b1b1b; border-bottom: 1px solid #2a2a2a;
  }
  header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  #status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #999; }
  #dot { width: 9px; height: 9px; border-radius: 50%; background: #d33; }
  #dot.on { background: #3c3; }
  #muteBtn, #scrollBtn, #langSel {
    font-size: 18px; background: none; border: 1px solid #333; border-radius: 8px;
    color: #eee; padding: 4px 10px; cursor: pointer;
  }
  #langSel { font-size: 13px; background: #1b1b1b; }
  #scrollBtn { font-size: 13px; }
  #scrollBtn.off { color: #777; border-color: #2a2a2a; }
  #feed { flex: 1; overflow-y: auto; padding: 18px; }
  .entry { max-width: 720px; margin: 0 auto 18px; border-radius: 10px; padding: 6px 10px; }
  .entry.speaking { background: #20281f; outline: 1px solid #3a4a38; }
  .en { font-size: 14px; color: #8a8a8a; margin-bottom: 4px; }
  .ko-row { display: flex; align-items: baseline; gap: 10px; }
  .ko { font-size: 21px; line-height: 1.5; flex: 1; }
  .ko.pending { color: #555; font-size: 14px; }
  .ref {
    font-size: 12px; color: #a8c3a0; white-space: nowrap;
    border: 1px solid #3a4a38; border-radius: 999px; padding: 2px 9px;
  }
  .ref:empty { display: none; }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  #overlayBox {
    display: flex; flex-direction: column; gap: 10px; align-items: stretch;
    width: min(340px, 92vw); max-height: 88dvh; overflow-y: auto;
    padding: 24px; border-radius: 16px;
    background: #1b1b1b; border: 1px solid #2a2a2a; text-align: center;
  }
  #overlayBox h2 { font-size: 18px; font-weight: 600; }
  #overlayBox p { font-size: 13px; color: #999; margin-bottom: 6px; }
  #overlay button.langBtn {
    font-size: 17px; padding: 11px 20px; border-radius: 12px; border: none;
    background: #2c6e31; color: #fff; cursor: pointer;
  }
  #overlay button.langBtn small { font-size: 11px; opacity: .75; display: block; }
</style>
</head>
<body>
<header>
  <h1>Live Sermon Translation</h1>
  <div id="status"><span id="dot"></span><span id="statusText">connecting…</span></div>
  <select id="langSel" title="Language"></select>
  <button id="scrollBtn" title="Toggle auto-scroll">⬇ Auto Scroll</button>
  <button id="muteBtn" title="음소거" hidden>🔊</button>
</header>
<div id="feed"></div>
<div id="overlay">
  <div id="overlayBox">
    <h2>실시간 한국어 통역 · Live Korean translation</h2>
    <p>버튼을 누르면 자막과 음성이 시작됩니다. Tap the button below to start subtitles and audio.</p>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const room = params.get("room") || "main";
// Language menu (English names first — the picker itself is explained in
// English). Free-trial branch: Korean only.
const LANGS = {
  ko:  { en: "Korean",    label: "한국어" },
};
let lang = LANGS[params.get("lang")] ? params.get("lang") : "ko";
const feed = document.getElementById("feed");
const dot = document.getElementById("dot");
const statusText = document.getElementById("statusText");
const muteBtn = document.getElementById("muteBtn");
const overlay = document.getElementById("overlay");

// ---- feed (aligned by sentence id) ----

const entries = new Map();  // sentence id -> entry element

let autoScroll = true;
const scrollBtn = document.getElementById("scrollBtn");

// Language switch reconnects the socket with the new lang and clears the
// feed (old entries would be in the wrong language). No page reload, so an
// already-enabled AudioContext keeps working.
const langSel = document.getElementById("langSel");
function langLabel(meta) {
  return meta.en === meta.label ? meta.en : `${meta.en} · ${meta.label}`;
}

for (const [code, meta] of Object.entries(LANGS)) {
  const opt = document.createElement("option");
  opt.value = code;
  opt.textContent = langLabel(meta);
  langSel.appendChild(opt);
}
langSel.value = lang;

function setLang(newLang) {
  if (newLang === lang) return;
  lang = newLang;
  langSel.value = lang;
  params.set("lang", lang);
  history.replaceState(null, "", `?${params.toString()}`);
  feed.innerHTML = "";
  entries.clear();
  const old = ws;
  connect();
  if (old) old.close();
}

langSel.onchange = () => setLang(langSel.value);

function scrollToBottom() {
  if (autoScroll) feed.scrollTop = feed.scrollHeight;
}

scrollBtn.onclick = () => {
  autoScroll = !autoScroll;
  scrollBtn.classList.toggle("off", !autoScroll);
  scrollBtn.textContent = autoScroll ? "⬇ Auto Scroll" : "⬇ Auto Scroll Off";
  scrollToBottom();
};

function addEntry(id, en) {
  const div = document.createElement("div");
  div.className = "entry";
  div.innerHTML = `<div class="en"></div>
    <div class="ko-row"><div class="ko pending"></div><span class="ref"></span></div>`;
  div.querySelector(".en").textContent = en;
  const target = div.querySelector(".ko");
  target.textContent = "Translating…";
  target.dir = "auto";  // Farsi is right-to-left
  feed.appendChild(div);
  scrollToBottom();
  entries.set(id, div);
  if (entries.size > 200) {  // keep the map from growing all service long
    const oldest = entries.keys().next().value;
    entries.delete(oldest);
  }
  return div;
}

function onTranscript(id, text) {
  addEntry(id, text);
}

function onTranslation(id, source, text, reference) {
  const entry = entries.get(id) || addEntry(id, source);
  const ko = entry.querySelector(".ko");
  ko.textContent = text;  // verse quotes arrive embedded, around just the verse
  ko.classList.remove("pending");
  if (reference) entry.querySelector(".ref").textContent = reference;
  scrollToBottom();
}

// ---- audio (queued, gapless, aligned to entries via id) ----

let ctx = null;      // AudioContext, created on user gesture
let gain = null;
let cursor = 0;      // when the next clip should start (ctx time)
let muted = false;

// The language buttons double as the audio-enable gesture: picking a
// language is the user click browsers require before audio can play.
const overlayBox = document.getElementById("overlayBox");
for (const [code, meta] of Object.entries(LANGS)) {
  const btn = document.createElement("button");
  btn.className = "langBtn";
  btn.textContent = `${meta.textOnly ? "💬" : "🔊"} ${langLabel(meta)}`;
  if (meta.textOnly) {
    const note = document.createElement("small");
    note.textContent = "subtitles only — no audio";
    btn.appendChild(note);
  }
  btn.onclick = () => {
    setLang(code);
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gain = ctx.createGain();
    gain.connect(ctx.destination);
    overlay.remove();
    muteBtn.hidden = false;
  };
  overlayBox.appendChild(btn);
}

// After a browser sleep / audio interruption the context lands in "suspended"
// (iOS: "interrupted") and must be resume()d — changing gain alone does nothing.
async function resumeAudio() {
  if (!ctx || ctx.state === "running") return;
  try { await ctx.resume(); } catch (e) { /* needs a user gesture — button click covers it */ }
  cursor = 0;  // anything scheduled before the suspend is stale; restart the queue from now
}

muteBtn.onclick = () => {
  if (ctx && ctx.state !== "running") {
    // context died while we were away — this click is a user gesture, so
    // use it to recover instead of toggling mute
    resumeAudio();
    muted = false;
    gain.gain.value = 1;
    muteBtn.textContent = "🔊";
    return;
  }
  muted = !muted;
  if (gain) gain.gain.value = muted ? 0 : 1;
  muteBtn.textContent = muted ? "🔇" : "🔊";
};

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && !muted) resumeAudio();
});

function pcmToAudioBuffer(b64, rate) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const samples = new Int16Array(bytes.buffer, 0, bytes.length >> 1);
  const buf = ctx.createBuffer(1, samples.length, rate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < samples.length; i++) ch[i] = samples[i] / 32768;
  return buf;
}

function onTts(id, b64, rate) {
  if (!ctx || !b64) return;  // audio not enabled yet — text still flows
  if (ctx.state !== "running") {
    // suspended mid-service: try to recover, but drop this clip — this is a
    // live feed and a replayed backlog would lag behind the preacher
    resumeAudio();
    return;
  }
  const buf = pcmToAudioBuffer(b64, rate || 24000);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(gain);
  const startAt = Math.max(ctx.currentTime + 0.05, cursor);
  src.start(startAt);
  cursor = startAt + buf.duration;

  // highlight the matching entry while its audio plays
  const entry = entries.get(id);
  if (entry) {
    setTimeout(() => entry.classList.add("speaking"),
               (startAt - ctx.currentTime) * 1000);
    src.onended = () => entry.classList.remove("speaking");
  }
}

// ---- websocket ----

let ws = null;
let reconnectTimer = null;

function connect() {
  clearTimeout(reconnectTimer);
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws/client?room=${room}&lang=${lang}`);
  ws.onopen = () => {
    dot.classList.add("on");
    statusText.textContent = `room: ${room} · ${LANGS[lang].en}`;
  };
  ws.onmessage = (event) => {
    const m = JSON.parse(event.data);
    if (m.type === "transcript") onTranscript(m.id, m.text);
    else if (m.type === "translation") onTranslation(m.id, m.source, m.text, m.reference);
    else if (m.type === "tts") onTts(m.id, m.audio, m.rate);
  };
  ws.onclose = (event) => {
    if (event.target !== ws) return;  // superseded by a language switch
    dot.classList.remove("on");
    statusText.textContent = "reconnecting…";
    reconnectTimer = setTimeout(connect, 2000);
  };
}
connect();
</script>
</body>
</html>
