<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Sermon Translation</title>
<script>
// Stamp the theme before first paint so there's no light/dark flash.
// Mirrors resolveTheme() in features/theme-toggle.
(function () {
  try {
    var saved = localStorage.getItem("woaf-theme");
    var theme = saved === "light" || saved === "dark"
      ? saved
      : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  } catch (e) {
    document.documentElement.setAttribute("data-theme", "light");
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/app/viewer.tsx"></script>
</body>
</html>
